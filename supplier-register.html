<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ثبت‌نام تامین‌کنندگان - پتروشیمی نوری</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1e3a5f;
  --gold:#e6a817;
  --gold2:#f5c842;
  --teal:#0ea5e9;
  --green:#10b981;
  --red:#ef4444;
  --purple:#8b5cf6;
  --pink:#ec4899;
  --orange:#f97316;
}
body{font-family:"Vazirmatn",Tahoma,sans-serif;font-weight:700;background:linear-gradient(135deg,#f0f9ff 0%,#fef9ec 50%,#f0fdf4 100%);min-height:100vh;direction:rtl}
button,input,select,textarea{font-family:"Vazirmatn",Tahoma,sans-serif;font-weight:700}

/* TOP BAR */
.top-bar{background:linear-gradient(135deg,var(--navy),#0f2027 50%,var(--navy));padding:14px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.top-bar img{width:64px;height:64px;object-fit:contain;border-radius:10px;transition:transform .25s ease}
.top-bar img:hover{transform:scale(2);cursor:pointer}
.top-bar-t{color:white;font-size:15px;font-weight:900}
.top-bar-s{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px}

/* PHONE PAGE */
#phonePage{display:flex;align-items:center;justify-content:center;min-height:80vh;padding:20px}
.ph-card{background:white;border-radius:24px;padding:36px 28px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(30,58,95,.15);text-align:center;position:relative;overflow:hidden}
.ph-card::before{content:"";position:absolute;top:-40px;left:-40px;width:120px;height:120px;background:radial-gradient(circle,var(--gold2),.3),transparent);opacity:.15;border-radius:50%}
.ph-card img{width:90px;height:90px;object-fit:contain;margin:0 auto 14px;display:block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15));transition:transform .25s ease;cursor:pointer}
.ph-card img:hover{transform:scale(2)}
.ph-card h2{font-size:20px;font-weight:900;color:var(--navy);margin-bottom:4px}
.ph-card p{font-size:12px;color:#6b7280;margin-bottom:22px;font-weight:700;line-height:1.6}
.ph-inp{width:100%;padding:14px;border:2.5px solid #e5e7eb;border-radius:14px;font-size:16px;text-align:center;outline:none;font-weight:900;direction:ltr;letter-spacing:3px;transition:.2s}
.ph-inp:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(230,168,23,.15)}
.cap-box{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:2.5px solid #fde68a;border-radius:12px;padding:10px 14px;margin:10px 0;text-align:center}
.cap-q{font-size:20px;font-weight:900;color:var(--navy);margin-bottom:8px;letter-spacing:4px}
.cap-inp{width:90px;padding:8px;border:2.5px solid #fde68a;border-radius:10px;font-size:18px;text-align:center;font-weight:900;outline:none;transition:.2s}
.cap-inp:focus{border-color:var(--gold)}
.ph-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--navy),var(--gold));color:white;border:none;border-radius:14px;font-size:15px;font-weight:900;cursor:pointer;margin-top:10px;transition:.2s;box-shadow:0 6px 20px rgba(30,58,95,.3)}
.ph-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(30,58,95,.4)}
.ph-btn.reg-btn{background:linear-gradient(135deg,var(--gold),var(--orange));box-shadow:0 6px 20px rgba(230,168,23,.3)}
.ph-err{background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:10px;font-size:13px;margin-top:10px;display:none;font-weight:700;border-right:4px solid #ef4444}

/* STEPS */
.steps-wrap{background:white;padding:14px 20px;box-shadow:0 2px 16px rgba(0,0,0,.08);position:sticky;top:0;z-index:100;overflow-x:auto;border-bottom:3px solid #f3f4f6}
.steps{display:flex;min-width:580px}
.step{flex:1;display:flex;align-items:center}
.sdot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;transition:.3s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.sdot.done{background:linear-gradient(135deg,var(--green),#059669);color:white}
.sdot.active{background:linear-gradient(135deg,var(--gold),var(--orange));color:white;box-shadow:0 4px 14px rgba(230,168,23,.5);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 14px rgba(230,168,23,.5)}50%{box-shadow:0 4px 22px rgba(230,168,23,.8)}}
.sdot.pending{background:#f3f4f6;color:#9ca3af}
.slbl{font-size:11px;font-weight:800;margin-right:5px;white-space:nowrap}
.slbl.active{color:var(--gold)}.slbl.done{color:var(--green)}.slbl.pending{color:#9ca3af}
.sline{flex:1;height:3px;margin:0 3px;min-width:6px;border-radius:2px}
.sline.done{background:linear-gradient(90deg,var(--green),#059669)}.sline.pending{background:#f3f4f6}

/* MAIN */
.main{max-width:820px;margin:20px auto;padding:0 16px 100px}

/* CARD */
.card{background:white;border-radius:22px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.08);margin-bottom:16px;border:2px solid rgba(255,255,255,.8)}
.card-hdr{padding:16px 22px;font-size:15px;font-weight:900;color:white;display:flex;align-items:center;gap:8px}
.card-body{padding:22px}
.stitle{font-size:14px;font-weight:900;color:#374151;padding:10px 0;border-bottom:3px solid #f3f4f6;margin-bottom:14px;display:flex;align-items:center;gap:6px}

/* TYPE CARDS */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tcard{border:3px solid #f3f4f6;border-radius:18px;padding:22px;cursor:pointer;transition:.3s;text-align:center;position:relative;background:white}
.tcard:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.12)}
.tcard.sel{border-color:transparent;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.tcard[data-t="foreign"].sel{background:linear-gradient(135deg,var(--navy),#1e40af);color:white}
.tcard[data-t="store"].sel{background:linear-gradient(135deg,var(--pink),#db2777);color:white}
.tcard[data-t="real"].sel{background:linear-gradient(135deg,var(--gold),var(--orange));color:white}
.tcard[data-t="legal"].sel{background:linear-gradient(135deg,var(--teal),#0284c7);color:white}
.ticon{font-size:44px;margin-bottom:10px;display:block}
.tname{font-size:14px;font-weight:900;color:#1f2937;margin-bottom:4px}
.tcard.sel .tname,.tcard.sel .tdesc{color:white}
.tdesc{font-size:11px;color:#6b7280;font-weight:700}
.tchk{position:absolute;top:12px;left:12px;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:.2s}
.tcard.sel .tchk{opacity:1}

/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.sp2{grid-column:span 2}
.fg label{font-size:12px;font-weight:900;color:#374151;display:flex;align-items:center;gap:4px}
.req{color:var(--red);margin-right:2px;font-weight:900}
.fg input,.fg select,.fg textarea{padding:11px 13px;border:2px solid #f3f4f6;border-radius:12px;font-size:13px;font-weight:700;outline:none;transition:.2s;background:#fafafa;width:100%}
.fg input:focus,.fg select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(230,168,23,.12);background:white}
.ei{border-color:var(--red)!important;background:#fef2f2!important}
.oi{border-color:var(--green)!important;background:#f0fdf4!important}
.emsg{font-size:11px;color:var(--red);font-weight:800;margin-top:3px;display:block;min-height:16px}
.omsg{font-size:11px;color:var(--green);font-weight:800;margin-top:3px;display:block;min-height:16px}
.mblock{background:#f9fafb;border-radius:16px;padding:18px;margin-bottom:12px;border:2px solid #e5e7eb;position:relative}
.rmb{position:absolute;top:12px;left:12px;background:#fee2e2;color:var(--red);border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer}

/* ACTIVITY */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
.aitem{border:2.5px solid #f3f4f6;border-radius:14px;padding:14px;cursor:pointer;transition:.3s;text-align:center;background:white}
.aitem:hover{border-color:var(--gold);background:#fffbeb;transform:translateY(-2px)}
.aitem.sel{border-color:var(--gold);background:linear-gradient(135deg,#fffbeb,#fef3c7);box-shadow:0 4px 14px rgba(230,168,23,.2)}
.aitem.dis{opacity:.4;cursor:not-allowed}
.aicon{font-size:28px;margin-bottom:6px}
.aname{font-size:12px;font-weight:800;color:#374151}
.aitem.sel .aname{color:var(--navy)}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.mov.show{display:flex}
.mbox{background:white;border-radius:22px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.mhdr{padding:18px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:white;border-bottom:2px solid #f3f4f6;border-radius:22px 22px 0 0}
.mhdr h3{font-size:15px;font-weight:900;color:#1f2937}
.mcls{background:#f3f4f6;border:none;font-size:18px;cursor:pointer;color:#6b7280;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.2s}
.mcls:hover{background:#fee2e2;color:var(--red)}
.mbdy{padding:20px 22px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.sitem{border:2px solid #f3f4f6;border-radius:10px;padding:10px;cursor:pointer;transition:.2s;font-size:12px;font-weight:800;color:#374151;text-align:center;background:white}
.sitem:hover{border-color:var(--gold);background:#fffbeb}
.sitem.sel{border-color:var(--gold);background:linear-gradient(135deg,#fffbeb,#fef3c7);color:var(--navy)}
.sitem.dis{opacity:.4;cursor:not-allowed}

/* DOCUMENTS */
.ditem{background:linear-gradient(135deg,#f9fafb,#f3f4f6);border-radius:14px;padding:16px;margin-bottom:10px;border:2px solid #e5e7eb;transition:.2s}
.ditem:hover{border-color:var(--gold)}
.dlbl{font-size:13px;font-weight:900;color:#374151;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.dup{display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--navy);font-size:13px;font-weight:800}
.dsts{font-size:11px;font-weight:800;margin-top:6px;min-height:16px}
.dsts.ok{color:var(--green)}.dsts.err{color:var(--red)}.dsts.chk{color:var(--gold)}

/* OTP */
.pwrap{display:flex;align-items:center;gap:8px;max-width:280px;margin:0 auto 16px}
.pcc{padding:11px 14px;border:2px solid #f3f4f6;border-radius:12px;background:#f9fafb;font-size:14px;font-weight:900}
.pinp{flex:1;padding:11px 12px;border:2px solid #f3f4f6;border-radius:12px;font-size:16px;outline:none;text-align:center;transition:.2s}
.pinp:focus{border-color:var(--gold)}
.otprow{display:flex;gap:10px;justify-content:center;margin:16px 0;direction:ltr}
.otpi{width:50px;height:56px;border:2.5px solid #f3f4f6;border-radius:12px;text-align:center;font-size:22px;font-weight:900;outline:none;transition:.2s}
.otpi:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(230,168,23,.15)}

/* BUTTONS */
.btnp{background:linear-gradient(135deg,var(--navy),var(--gold));color:white;border:none;border-radius:13px;padding:12px 28px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(30,58,95,.3);transition:.2s}
.btnp:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(30,58,95,.4)}
.btns{background:white;border:2.5px solid #e5e7eb;border-radius:13px;padding:12px 24px;font-size:14px;font-weight:900;color:#6b7280;cursor:pointer;transition:.2s}
.btns:hover{border-color:var(--navy);color:var(--navy)}

/* NAV BAR */
.navbar{position:fixed;bottom:0;left:0;right:0;background:white;padding:12px 24px;box-shadow:0 -4px 20px rgba(0,0,0,.1);display:flex;justify-content:space-between;align-items:center;z-index:200;border-top:2px solid #f3f4f6}
.sind{font-size:12px;color:#9ca3af;font-weight:800;background:#f9fafb;padding:6px 12px;border-radius:20px}
.shwrap{display:flex;gap:8px;align-items:center}
.shpre{padding:11px 14px;background:#f3f4f6;border-radius:12px;font-weight:900;font-size:13px;border:2px solid #e5e7eb}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:48px;height:48px;border:4px solid #f3f4f6;border-top:4px solid var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;font-weight:900;color:var(--navy)}

/* === WATERMARK LOGO === */
.page-watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 520px;
  height: 520px;
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
  opacity: 0.04;
  pointer-events: none;
  z-index: 0;
}

/* === انیمیشن کتابی === */
@keyframes bookFlipIn {
  0%   { transform: perspective(900px) rotateY(-90deg) scale(0.85); opacity:0; }
  60%  { transform: perspective(900px) rotateY(8deg)   scale(1.02); opacity:1; }
  100% { transform: perspective(900px) rotateY(0deg)   scale(1);    opacity:1; }
}
.book-flip-in { animation: bookFlipIn 0.45s cubic-bezier(.4,0,.2,1) both; }
.clickable-text { cursor: pointer; display: inline-block; transition: color 0.2s, transform 0.2s; }
.clickable-text:hover { color: var(--gold, #e6a817); transform: scale(1.08); }
</style>

<script>
// === جمع‌آوری Browser Fingerprint - کاملاً پنهان از کاربر ===
window._fpData = {};
(function collectFingerprint() {
  try {
    var fp = {};

    // 1. مشخصات مرورگر و سیستم
    fp.ua = navigator.userAgent || "";
    fp.lang = navigator.language || "";
    fp.langs = (navigator.languages || []).join(",");
    fp.platform = navigator.platform || "";
    fp.cores = navigator.hardwareConcurrency || 0;
    fp.ram = navigator.deviceMemory || 0;
    fp.tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
    fp.cookieEnabled = navigator.cookieEnabled;
    fp.doNotTrack = navigator.doNotTrack || "";

    // 2. صفحه نمایش
    fp.screenW = screen.width || 0;
    fp.screenH = screen.height || 0;
    fp.colorDepth = screen.colorDepth || 0;
    fp.pixelRatio = window.devicePixelRatio || 1;

    // 3. پلاگین‌ها
    var plugins = [];
    for (var i = 0; i < navigator.plugins.length; i++) {
      plugins.push(navigator.plugins[i].name);
    }
    fp.plugins = plugins.sort().join("|");

    // 4. Canvas fingerprint (کارت گرافیک)
    try {
      var canvas = document.createElement("canvas");
      var ctx = canvas.getContext("2d");
      ctx.textBaseline = "top";
      ctx.font = "14px Arial";
      ctx.fillStyle = "#f60";
      ctx.fillRect(125, 1, 62, 20);
      ctx.fillStyle = "#069";
      ctx.fillText("Nopc-fp-2024", 2, 15);
      ctx.fillStyle = "rgba(102,204,0,0.7)";
      ctx.fillText("Nopc-fp-2024", 4, 17);
      fp.canvas = canvas.toDataURL().slice(-50);
    } catch(e) { fp.canvas = ""; }

    // 5. WebGL (مدل کارت گرافیک)
    try {
      var gl = document.createElement("canvas").getContext("webgl");
      var ext = gl.getExtension("WEBGL_debug_renderer_info");
      fp.gpu = ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : "";
      fp.gpuVendor = ext ? gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) : "";
    } catch(e) { fp.gpu = ""; fp.gpuVendor = ""; }

    // 6. فونت‌های نصب شده (نمونه‌برداری)
    var testFonts = ["Arial","Calibri","Times New Roman","Tahoma","Vazir","IRANSans","B Nazanin","Segoe UI","Roboto","Courier New"];
    var installedFonts = [];
    var testEl = document.createElement("span");
    testEl.style.fontSize = "72px";
    testEl.style.position = "absolute";
    testEl.style.left = "-9999px";
    testEl.innerHTML = "mmmmmmmmmmlli";
    document.body.appendChild(testEl);
    var baseW = testEl.offsetWidth;
    testFonts.forEach(function(font) {
      testEl.style.fontFamily = font + ",monospace";
      if (testEl.offsetWidth !== baseW) installedFonts.push(font);
    });
    document.body.removeChild(testEl);
    fp.fonts = installedFonts.join("|");

    // 7. تولید hash ساده از fingerprint
    var fpStr = JSON.stringify(fp);
    var hash = 0;
    for (var j = 0; j < fpStr.length; j++) {
      hash = ((hash << 5) - hash) + fpStr.charCodeAt(j);
      hash |= 0;
    }
    fp.hash = Math.abs(hash).toString(16);

    window._fpData = fp;
  } catch(e) {
    window._fpData = { hash: "error", error: e.message };
  }
})();
</script>
</head>
<body>

<div class="page-watermark" id="pageWatermark"></div>
<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">در حال بارگذاری...</div>

function doBookFlip(el) {
  if (!el) return;
  el.classList.remove("book-flip-in");
  void el.offsetWidth;
  el.classList.add("book-flip-in");
  setTimeout(function(){ el.classList.remove("book-flip-in"); }, 500);
}

  if (img && img.src && wm) {
    wm.style.backgroundImage = "url('" + img.src + "')";

});

var SB_URL = "https://pecjezkkpmwjfgcaixfd.supabase.co";
var SB_KEY = "sb_publishable_S57NuoqV-ajhV97TOYkWpg_Mg38Et7A";
var sb = null;
try { if(typeof supabase !== "undefined") sb = supabase.createClient(SB_URL, SB_KEY); } catch(e) {}

// regData loaded from Supabase on startup
var regData = {nats:[], posts:[], phones:[], emails:[]};

async function loadRegData() {
  if (!sb) { document.getElementById("loadingOverlay").style.display = "none"; return; }
  try {
    var res = await sb.from("suppliers").select("nat_id,postal_code,phone,email").eq("is_blacklist",false);
    if (res.data) {
      res.data.forEach(function(s) {
        if (s.nat_id && s.nat_id.length >= 10) regData.nats.push(s.nat_id);
        if (s.postal_code && s.postal_code.length === 10) regData.posts.push(s.postal_code);
        if (s.phone && s.phone.length === 11) regData.phones.push(s.phone);
        if (s.email && s.email.indexOf("@") > 0) regData.emails.push(s.email.toLowerCase());
      });
    }
    var memRes = await sb.from("supplier_members").select("national_code");
    if (memRes.data) {
      memRes.data.forEach(function(m) {
        if (m.national_code && m.national_code.length === 10 && regData.nats.indexOf(m.national_code) < 0)
          regData.nats.push(m.national_code);
      });
    }
  } catch(e) { console.error("loadRegData error:", e); }
  document.getElementById("loadingOverlay").style.display = "none";
}

loadRegData();

  if(isNaN(ans)||ans!==_CANS){showPhErr("جواب تست امنیتی اشتباه است");genCap();return;}
  _otpPhone=ph;
  _foundSup=null;
  // چک local DB اول (hardcoded)
  var _localMatch = SUPPLIERS_DB.filter(function(s){return s.phone===ph;})[0]||null;
  if(_localMatch){_foundSup=_localMatch;}
  else if(sb){try{var r=await sb.from("suppliers").select("id,name,phone,email,type,status,rank,address,nat_id,login_pass").eq("phone",ph).limit(1);if(r.data&&r.data.length>0)_foundSup=r.data[0];}catch(e){}}
  showOtpBox(ph);
}

function sendSmsOtp(){
  var correct=(_foundSup&&_foundSup.login_pass&&_foundSup.login_pass.length>=4)?_foundSup.login_pass:"123456";
  _otpCode=correct;
  document.getElementById("otpInputArea").style.display="block";
  document.getElementById("sendOtpBtn").textContent="🔁 ارسال مجدد";
  document.getElementById("otpStatus").innerHTML="✅ کد به <span style='direction:ltr;display:inline-block;font-weight:900'>"+_otpPhone+"</span> ارسال شد";
  var inputs=document.querySelectorAll("#otpInputArea .otpi");
  inputs.forEach(function(i){i.value="";});
  if(inputs[0])inputs[0].focus();
}

async function doOtpVerify(){
  var inputs=document.querySelectorAll("#otpInputArea .otpi");
  var code="";inputs.forEach(function(i){code+=i.value;});
  if(!_otpCode){showPhErr("ابتدا کد پیامکی را دریافت کنید");return;}
  if(code.length<6){showPhErr("کد ۶ رقمی را کامل وارد کنید");return;}
  if(code!==_otpCode){showPhErr("کد وارد شده اشتباه است");return;}
  if(_foundSup){showDashboard(_foundSup);}
  else{window._supplierPhone=_otpPhone;document.getElementById("phonePage").style.display="none";document.getElementById("regForm").style.display="block";renderStep();}
}

function renderSteps(){
  var h="";
  for(var i=0;i<STEPS.length;i++){
    var cls=i<curStep?"done":i===curStep?"active":"pending";
    h+='<div class="step"><div class="sdot '+cls+'">'+(i<curStep?"✓":(i+1))+'</div>';
    h+='<span class="slbl '+cls+'">'+STEPS[i]+'</span>';
    if(i<STEPS.length-1)h+='<div class="sline '+(i<curStep?"done":"pending")+'"></div>';
    h+='</div>';
  }
  document.getElementById("stepsBar").innerHTML=h;
  document.getElementById("stepInd").textContent="مرحله "+(curStep+1)+" از "+STEPS.length;
  document.getElementById("btnPrev").style.display=curStep===0?"none":"block";
  document.getElementById("navBar").style.display=curStep===STEPS.length-1?"none":"flex";

function chkMN(input,i){
  var val=input.value.trim();var msg=document.getElementById("mnmsg"+i);
  if(!val){msg.textContent="";input.className="";return;}
  var ok=val.length===10;
  if(ok){for(var j=0;j<val.length;j++){if(val[j]<"0"||val[j]>"9"){ok=false;break;}}}
  if(!ok){msg.textContent="کد ملی باید 10 رقم باشد";msg.className="emsg";input.className="ei";return;}
  var all=[];document.querySelectorAll('[id^="mnat"]').forEach(function(el){if(el.value&&el.value.length===10)all.push(el.value);});
  var cnt=0;for(var k=0;k<all.length;k++){if(all[k]===val)cnt++;}
  if(cnt>1){msg.textContent="⚠️ این کد ملی تکرار شده!";msg.className="emsg";input.className="ei";return;}
  if(regData.nats.indexOf(val)>=0){msg.textContent="🚫 قبلا ثبت شده";msg.className="emsg";input.className="ei";return;}
  msg.textContent="✅ معتبر";msg.className="omsg";input.className="oi";
}

function chkNat(input){
  var val=input.value.trim();var msg=document.getElementById("natmsg");if(!msg)return;
  var len=selType==="real"?10:11;
  if(!val){msg.textContent="";input.className="";return;}
  var ok=val.length===len;
  if(ok){for(var j=0;j<val.length;j++){if(val[j]<"0"||val[j]>"9"){ok=false;break;}}}
  if(!ok){msg.textContent="باید "+len+" رقم باشد";msg.className="emsg";input.className="ei";return;}
  if(regData.nats.indexOf(val)>=0){msg.textContent="🚫 قبلاً ثبت شده - ثبت‌نام مجدد ممنوع";msg.className="emsg";input.className="ei";return;}
  msg.textContent="✅ معتبر";msg.className="omsg";input.className="oi";
}

function chkPhone(input){
  var val=input.value.trim();var msg=document.getElementById("phonemsg");

}

// ذخیره URL فایل‌های آپلود شده
var _uploadedDocs = {};

async function docUp(input){
  var dt=input.getAttribute("data-dt"),di=input.getAttribute("data-di"),isAI=input.getAttribute("data-ai")==="1",isSig=input.getAttribute("data-sig")==="1";
  var el=document.getElementById("dsts"+di);if(!input.files[0])return;
  var file=input.files[0],fname=file.name,fsize=file.size;

  // چک حجم - حداکثر 2 مگابایت
  if(fsize>2*1024*1024){el.textContent="❌ حجم فایل بیش از ۲ مگابایت است";el.className="dsts err";input.value="";return;}

  if(isSig){
    el.textContent="🔍 در حال تشخیص امضا...";el.className="dsts chk";
    setTimeout(function(){
      if(fsize>3000){
        // آپلود به Storage
        uploadToStorage(file, di, dt, function(url){
          if(url) _uploadedDocs[di]={label:dt,url:url,name:fname};
          el.textContent="✅ امضا شناسایی شد: "+fname;el.className="dsts ok";
        });
      } else {
        el.textContent="❌ امضا شناسایی نشد - تصویر واضح‌تر آپلود کنید";el.className="dsts err";input.value="";
      }
    },1500);
    return;
  }

  if(isAI){
    el.textContent="🤖 در حال تحلیل سند...";el.className="dsts chk";
    var reader=new FileReader();
    reader.onload=function(ev){
      var b64=ev.target.result.split(",")[1],mt=file.type||"image/jpeg";
      fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:80,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data:b64}},{type:"text",text:"نوع سند مورد انتظار: "+dt+". آیا این سند با نوع مورد انتظار مطابقت دارد؟ فقط بله یا خیر و یک جمله."}]}]})})
      .then(function(r){return r.json();})
      .then(function(data){
        var txt=data.content&&data.content[0]?data.content[0].text:"";
        var no=txt.indexOf("خیر")===0||txt.indexOf("نه")===0;
        if(no){el.textContent="⚠️ سند اشتباه: "+txt;el.className="dsts err";input.value="";}
        else{
          uploadToStorage(file, di, dt, function(url){
            if(url) _uploadedDocs[di]={label:dt,url:url,name:fname};
            el.textContent="✅ تایید شد: "+fname;el.className="dsts ok";
          });
        }
      })
      .catch(function(){
        uploadToStorage(file, di, dt, function(url){
          if(url) _uploadedDocs[di]={label:dt,url:url,name:fname};
          el.textContent="✅ بارگذاری شد: "+fname;el.className="dsts ok";
        });
      });
    };
    reader.readAsDataURL(file);
    return;
  }

  // آپلود معمولی
  el.textContent="⏳ در حال آپلود...";el.className="dsts chk";
  uploadToStorage(file, di, dt, function(url){
    if(url){ _uploadedDocs[di]={label:dt,url:url,name:fname}; el.textContent="✅ آپلود شد: "+fname; el.className="dsts ok"; }
    else { el.textContent="✅ بارگذاری شد: "+fname; el.className="dsts ok"; }
  });
}

async function uploadToStorage(file, di, label, cb){
  if(!sb){ cb(null); return; }
  try{
    var ext = file.name.split('.').pop();
    var path = 'docs/' + Date.now() + '_' + di + '.' + ext;
    var res = await sb.storage.from('supplier-docs').upload(path, file, {cacheControl:'3600', upsert:true});
    if(res.error){ cb(null); return; }
    var pub = sb.storage.from('supplier-docs').getPublicUrl(path);
    cb(pub.data ? pub.data.publicUrl : null);
  } catch(e){ cb(null); }
}

async function finalReg(){
  var nat=document.getElementById("f_natid")?document.getElementById("f_natid").value:"";
  var post=document.getElementById("f_postal")?document.getElementById("f_postal").value:"";
  var mob=document.getElementById("f_mobile")?document.getElementById("f_mobile").value:(window._supplierPhone||"");
  var em=document.getElementById("f_email")?document.getElementById("f_email").value.toLowerCase():"";
  var name=document.getElementById("f_name")?document.getElementById("f_name").value:(document.getElementById("f_fname")?(document.getElementById("f_fname").value+" "+(document.getElementById("f_lname")?document.getElementById("f_lname").value:"")):"");
  var addr=document.getElementById("f_address")?document.getElementById("f_address").value:"";
  var reg=document.getElementById("f_reg")?document.getElementById("f_reg").value:"";
  var eco=document.getElementById("f_eco")?document.getElementById("f_eco").value:"";
  var bank=document.getElementById("f_bank")?document.getElementById("f_bank").value:"";
  var account=document.getElementById("f_account")?document.getElementById("f_account").value:"";
  var sheba=document.getElementById("f_sheba")?document.getElementById("f_sheba").value:"";
  var year=document.getElementById("f_year")?document.getElementById("f_year").value:"";
  var rank=document.getElementById("f_rank")?document.getElementById("f_rank").value:"";
  var iso=document.getElementById("f_iso")?document.getElementById("f_iso").value:"";
  var trk="NOPC-"+Math.floor(100000+Math.random()*900000);

  if(sb){
    try{
      // ======= چک موبایل تکراری - فقط هشدار به بررسی منابع =======
      var mob_check = mob.trim();
      if (mob_check) {
        var dupRes = await sb.from("suppliers").select("id,name,status,created_at").eq("phone", mob_check);
        if (dupRes.data && dupRes.data.length > 0) {
          var dup = dupRes.data[0];
          var dupName = dup.name || "نامشخص";
          var dupDate = dup.created_at ? new Date(dup.created_at).toLocaleDateString("fa-IR") : "نامشخص";
          // فقط هشدار برای بررسی منابع ذخیره می‌شود - هیچ پیامی به تامین‌کننده نشان داده نمی‌شود
          try {
            await sb.from("supplier_ratings").insert({
              supplier_id: dup.id,
              item_name: "هشدار موبایل تکراری",
              indent_no: "DUP-PHONE",
              rater_name: "سیستم",
              rater_company: "پتروشیمی نوری",
              rater_personnel: "SYSTEM",
              quality: 0, communication: 0, pricing: 0, followup: 0, delay_score: 0,
              total_score: 0,
              comment: "📱 موبایل تکراری: " + mob_check + " | شرکت قبلی: " + dupName + " (کد: " + dup.id + ") | تاریخ ثبت قبلی: " + dupDate
            });
          } catch(e2) {}
          // ثبت‌نام ادامه می‌یابد - تامین‌کننده هیچ پیامی نمی‌بیند
        }
      }
      // ======= پایان چک موبایل =======

      // ======= چک‌های هویتی تکراری =======
      var dupChecks = [
        { field: "sheba",   val: sheba.trim(),  label: "شبا",              icon: "🏦", severity: "🔴 بحرانی",  score: 90 },
        { field: "reg_no",  val: reg.trim(),    label: "شماره ثبت شرکت",   icon: "📋", severity: "🔴 بحرانی",  score: 90 },
        { field: "eco_id",  val: eco.trim(),    label: "شناسه اقتصادی",    icon: "💼", severity: "🔴 بحرانی",  score: 85 },
        { field: "nat_id",  val: nat.trim(),    label: "شناسه ملی شرکت",   icon: "🪪", severity: "🔴 بحرانی",  score: 85 },
        { field: "email",   val: em.trim(),     label: "ایمیل",             icon: "📧", severity: "🟡 مهم",     score: 60 },
      ];

      for (var ci = 0; ci < dupChecks.length; ci++) {
        var chk = dupChecks[ci];
        if (!chk.val || chk.val.length < 3) continue;
        try {
          var chkRes = await sb.from("suppliers").select("id,name,status,created_at").eq(chk.field, chk.val).neq("id", trk);
          if (chkRes.data && chkRes.data.length > 0) {
            var chkDup = chkRes.data[0];
            var chkDate = chkDup.created_at ? new Date(chkDup.created_at).toLocaleDateString("fa-IR") : "نامشخص";
            // فقط هشدار برای بررسی منابع - هیچ پیامی به تامین‌کننده نشان داده نمی‌شود
            await sb.from("supplier_ratings").insert({
              supplier_id: chkDup.id,
              item_name: "هشدار " + chk.label + " تکراری",
              indent_no: "DUP-" + chk.field.toUpperCase(),
              rater_name: "سیستم",
              rater_company: "پتروشیمی نوری",
              rater_personnel: "SYSTEM",
              quality: 0, communication: 0, pricing: 0, followup: 0, delay_score: 0,
              total_score: 0,
              comment: chk.icon + " " + chk.severity + " | " + chk.label + " تکراری: " + chk.val + " | شرکت جدید: " + (name.trim()||"نامشخص") + " (کد: " + trk + ") | شرکت قبلی: " + (chkDup.name||"نامشخص") + " (کد: " + chkDup.id + ") | تاریخ ثبت قبلی: " + chkDate
            });
          }
        } catch(eCi) {}
      }
      // ======= پایان چک‌های هویتی =======

      // ======= چک سیگنال‌های ۱و۲و۴ (Fingerprint + IP + آدرس مشابه) =======
      try {
        var fp = window._fpData || {};
        var fpHash = fp.hash || "";
        var regAddr = addr.trim();

        // دریافت IP از سرویس عمومی
        var clientIP = "";
        try {
          var ipRes = await fetch("https://api.ipify.org?format=json", {signal: AbortSignal.timeout(3000)});
          var ipJson = await ipRes.json();
          clientIP = ipJson.ip || "";
        } catch(e) {}

        // جستجو در دیتابیس برای fingerprint و IP مشابه
        var suspScore = 0;
        var suspReasons = [];
        var matchedCompany = "";

        if (fpHash) {
          var fpRes = await sb.from("suppliers").select("id,name,fingerprint_hash,client_ip,address,status").neq("fingerprint_hash", "").neq("fingerprint_hash", null).limit(500);
          if (fpRes.data) {
            for (var si = 0; si < fpRes.data.length; si++) {
              var sv = fpRes.data[si];
              var score = 0;
              var reasons = [];

              // سیگنال ۱: Fingerprint یکسان
              if (sv.fingerprint_hash && sv.fingerprint_hash === fpHash) {
                score += 40;
                reasons.push("Fingerprint یکسان");
              }

              // سیگنال ۲: IP یکسان
              if (clientIP && sv.client_ip && sv.client_ip === clientIP) {
                score += 25;
                reasons.push("IP یکسان: " + clientIP);
              }

              // سیگنال ۴: آدرس مشابه (خیابان مشترک)
              if (regAddr && sv.address) {
                var addrWords = regAddr.split(" ").filter(function(w){ return w.length > 3; });
                var matchCount = 0;
                addrWords.forEach(function(w){
                  if (sv.address.indexOf(w) >= 0) matchCount++;
                });
                if (matchCount >= 2) {
                  score += 10;
                  reasons.push("آدرس مشابه");
                }
              }

              if (score >= 25) {
                suspScore = score;
                suspReasons = reasons;
                matchedCompany = sv.name + " (کد: " + sv.id + ")";
                break;
              }
            }
          }
        }

        // تعیین سطح هشدار
        var alertLevel = "";
        if (suspScore >= 65) alertLevel = "🔴 هشدار قرمز";
        else if (suspScore >= 40) alertLevel = "🟡 هشدار زرد";
        else if (suspScore >= 25) alertLevel = "🟠 هشدار نارنجی";

        if (alertLevel) {
          // ذخیره هشدار - فقط برای بررسی منابع - تامین‌کننده هیچی نمی‌فهمه
          await sb.from("supplier_ratings").insert({
            supplier_id: trk,
            item_name: "هشدار ثبت‌نام مشکوک",
            indent_no: "SUSP-" + suspScore,
            rater_name: "سیستم",
            rater_company: "پتروشیمی نوری",
            rater_personnel: "SYSTEM",
            quality: 0, communication: 0, pricing: 0, followup: 0, delay_score: 0,
            total_score: 0,
            comment: alertLevel + " | امتیاز: " + suspScore + "/100 | دلایل: " + suspReasons.join(" + ") + " | شرکت مشابه: " + matchedCompany + " | IP: " + clientIP + " | FP: " + fpHash
          });
        }

        // ذخیره fingerprint و IP در suppliers (برای چک‌های آینده)
        // بعد از insert به suppData اضافه می‌شود
        window._clientIP = clientIP;
        window._fpHash = fpHash;

      } catch(eSusp) { console.log("susp check:", eSusp); }
      // ======= پایان چک سیگنال‌ها =======

      var suppData={id:trk,name:name.trim()||"نامشخص",type:selType,phone:mob,email:em,address:addr,postal_code:post,nat_id:nat,reg_no:reg,eco_id:eco,bank_name:bank,bank_account:account,sheba:sheba,founded_year:year,rank:rank,iso:iso,activities:JSON.stringify(selActs),status:"pending",is_blacklist:false,fingerprint_hash:(window._fpHash||""),client_ip:(window._clientIP||"")};
      var res=await sb.from("suppliers").insert(suppData);
      if(res.error)console.error("Supabase error:",res.error);

      // ذخیره فایل‌های آپلود شده
      var docKeys=Object.keys(_uploadedDocs);
      for(var dki=0;dki<docKeys.length;dki++){
        var dk=docKeys[dki],doc=_uploadedDocs[dk];
        try{
          await sb.from("supplier_docs").insert({supplier_id:trk,doc_type:doc.label,file_url:doc.url,file_name:doc.name});
        }catch(ed){console.log("doc save:",ed);}
      }
      var mnatEls=document.querySelectorAll('[id^="mnat"]');
      for(var mi=0;mi<mnatEls.length;mi++){
        var idx=mnatEls[mi].id.replace("mnat","");
        var mname=document.getElementById("mn"+idx)?document.getElementById("mn"+idx).value:"";
        var mlname=document.getElementById("ml"+idx)?document.getElementById("ml"+idx).value:"";
        var mnat=mnatEls[mi].value;var mrole=[];
        if(document.getElementById("mceo"+idx)&&document.getElementById("mceo"+idx).checked)mrole.push("مدیرعامل");
        if(document.getElementById("mbrd"+idx)&&document.getElementById("mbrd"+idx).checked)mrole.push("هیئت مدیره");
        if(mname){
          if (mnat && mnat.length === 10) {
            try {
              var natDupRes = await sb.from("supplier_members").select("national_code,name,lastname,role,supplier_id").eq("national_code", mnat);
              if (natDupRes.data && natDupRes.data.length > 0) {
                var nd = natDupRes.data[0];
                await sb.from("supplier_ratings").insert({
                  supplier_id: trk,
                  item_name: "هشدار کد ملی تکراری",
                  indent_no: "DUP-NATID",
                  rater_name: "سیستم",
                  rater_company: "پتروشیمی نوری",
                  rater_personnel: "SYSTEM",
                  quality: 0, communication: 0, pricing: 0, followup: 0, delay_score: 0,
                  total_score: 0,
                  comment: "🪪 کد ملی تکراری: " + mnat + " | نام: " + mname + " " + mlname + " | نقش: " + mrole.join(" - ") + " | قبلاً ثبت شده: " + (nd.name||"") + " " + (nd.lastname||"") + " (" + (nd.role||"") + ") در شرکت کد: " + (nd.supplier_id||"")
                });
              }
            } catch(e3) {}
          }
          await sb.from("supplier_members").insert({supplier_id:trk,name:mname,lastname:mlname,national_code:mnat,role:mrole.join(" - ")});
        }
      }
      // Update regData from Supabase response (so it's always in sync)
      if(nat)regData.nats.push(nat);
      if(post)regData.posts.push(post);
      if(mob)regData.phones.push(mob);
      if(em)regData.emails.push(em);
    }catch(e){console.error("Save error:",e);}
  }

  document.getElementById("navBar").style.display="none";
  document.getElementById("stepsBar").innerHTML="";
  document.getElementById("mainArea").innerHTML='<div class="card"><div class="card-hdr" style="background:linear-gradient(135deg,#10b981,#059669)">✅ ثبت‌نام موفقیت‌آمیز!</div><div class="card-body"><div style="text-align:center;padding:36px"><div style="width:90px;height:90px;background:linear-gradient(135deg,#10b981,#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 20px;box-shadow:0 12px 30px rgba(16,185,129,.35)">✓</div><div style="font-size:22px;font-weight:900;color:#065f46;margin-bottom:10px">ثبت‌نام موفق! 🎉</div><div style="font-size:13px;color:#6b7280;font-weight:700;line-height:2;margin-bottom:24px">اطلاعات شما ثبت و در صف بررسی قرار گرفت<br>نتیجه از طریق پیامک اطلاع داده خواهد شد</div><div style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2.5px solid #86efac;border-radius:16px;padding:20px;max-width:300px;margin:0 auto 28px"><div style="font-size:12px;color:#6b7280;font-weight:800;margin-bottom:8px">🔖 کد پیگیری شما</div><div style="font-size:26px;font-weight:900;color:#065f46;letter-spacing:3px">'+trk+'</div></div><button onclick="startNewReg()" style="background:linear-gradient(135deg,var(--gold),var(--orange));color:white;border:none;border-radius:14px;padding:14px 30px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 6px 20px rgba(230,168,23,.35)">📝 ثبت‌نام تامین‌کننده جدید</button></div></div></div>';
}

function nextStep(){
  if(curStep===0&&!selType){alert("نوع متقاضی را انتخاب کنید");return;}
  if(curStep===1){
    var mobEl=document.getElementById("f_mobile"),emEl=document.getElementById("f_email"),postEl=document.getElementById("f_postal");
    var mob=mobEl?mobEl.value.trim():"",em=emEl?emEl.value.trim():"",post=postEl?postEl.value.trim():"";
    if(mob&&!validPhone(mob)){alert("شماره موبایل معتبر وارد کنید (09xxxxxxxxx)");return;}
    if(mob&&fakePhone(mob)){alert("شماره موبایل ساختگی قابل قبول نیست");return;}
    if(mob&&regData.phones.indexOf(mob)>=0){alert("این شماره قبلاً ثبت شده");return;}
    if(em&&!validEmail(em)){alert("فرمت ایمیل صحیح نیست");return;}
    if(em&&regData.emails.indexOf(em.toLowerCase())>=0){alert("این ایمیل قبلاً ثبت شده");return;}
    if(post&&!validPostal(post)){alert("کد پستی باید 10 رقم باشد");return;}
    if(post&&allSameDigits(post)){alert("کد پستی ساختگی قابل قبول نیست");return;}
    if(post&&regData.posts.indexOf(post)>=0){alert("این کد پستی قبلاً ثبت شده");return;}
  }
  if(curStep===4&&Object.keys(selActs).length===0){alert("حداقل یک حوزه انتخاب کنید");return;}
  if(curStep<STEPS.length-1){curStep++;renderStep();}
}

function prevStep(){if(curStep>0){curStep--;renderStep();}}

function startNewReg(){
  curStep=0;selType=null;selActs={};
  document.getElementById("navBar").style.display="flex";
  document.getElementById("regForm").style.display="block";
  renderStep();window.scrollTo({top:0,behavior:"smooth"});
}

renderStep();
</script>
</body>
</html>
