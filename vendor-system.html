<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سامانه مدیریت تامین‌کنندگان - پتروشیمی نوری</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Vazirmatn",Tahoma,sans-serif;font-weight:700;background:#f8fafc;direction:rtl;min-height:100vh}
button,input,select,textarea{font-family:"Vazirmatn",Tahoma,sans-serif;font-weight:700}
:root{--gold:#e6a817;--gold-d:#d97706;--navy:#1e3a5f;--navy-d:#0f2027;--g:#f3f4f6;--g2:#e5e7eb;--g5:#6b7280;--g8:#1f2937;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--r:12px}

/* LOGIN */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e3a5f 0%,#0f2027 60%,#1a3a5c 100%)}
.lbox{background:white;border-radius:20px;padding:40px;width:90%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.llogo{text-align:center;margin-bottom:28px}
.llogo img{width:120px;height:120px;object-fit:contain;margin:0 auto 10px;display:block;transition:transform .25s ease;cursor:pointer}
.llogo img:hover{transform:scale(1.9)}
.llogo h1{font-size:18px;color:var(--g8);font-weight:900}
.llogo p{font-size:12px;color:var(--g5);margin-top:4px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;font-weight:900;color:#374151;margin-bottom:6px}
.fg input,.fg select{width:100%;padding:11px 13px;border:1.5px solid var(--g2);border-radius:10px;font-size:14px;outline:none;transition:.2s;background:white}
.fg input:focus,.fg select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.lbtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:white;border:none;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;transition:transform .2s,box-shadow .2s}
.lbtn:hover{transform:scale(1.04);box-shadow:0 6px 20px rgba(230,168,23,.4)}
.lerr{background:#fee2e2;color:#dc2626;padding:10px;border-radius:8px;font-size:13px;margin-top:10px;display:none;font-weight:700}
.lfoot{text-align:center;font-size:11px;color:#9ca3af;margin-top:16px}
.reg-link{display:block;background:linear-gradient(135deg,#10b981,#059669);color:white;border-radius:10px;padding:14px;font-size:15px;font-weight:900;text-decoration:none;text-align:center;margin-top:10px;width:100%;box-sizing:border-box}
.captcha-box{background:#f8fafc;border:1.5px solid var(--g2);border-radius:10px;padding:14px;margin-bottom:14px;text-align:center}
.captcha-q{font-size:20px;font-weight:900;color:var(--navy);margin-bottom:10px;letter-spacing:2px}
.captcha-inp{width:100%;padding:10px;border:1.5px solid var(--g2);border-radius:8px;font-size:16px;text-align:center;font-weight:900;outline:none}
.captcha-inp:focus{border-color:var(--gold)}

/* GLOBAL HEADER LOGO */
.top-logo-bar{background:linear-gradient(135deg,var(--navy),var(--navy-d));padding:8px 20px;display:flex;align-items:center;gap:10px}
.top-logo-bar img{width:48px;height:48px;object-fit:contain}
.top-logo-bar span{color:white;font-size:14px;font-weight:900}

/* APP */
#app{display:none}
.hdr{background:linear-gradient(135deg,#1e3a5f,#0f2027);border-bottom:2px solid var(--gold);padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;height:64px}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:44px;height:44px;object-fit:contain;transition:transform .25s ease}
.hdr-logo:hover{transform:scale(2);cursor:pointer}
.hdr-left h1{font-size:15px;font-weight:900;color:white}
.hdr-left p{font-size:11px;color:rgba(255,255,255,.7)}
.ubadge{background:var(--g);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--g5);font-weight:700}
.ubadge.adm{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:white}
.logout{background:none;border:1.5px solid var(--g2);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--g5);cursor:pointer}

.stats{display:flex;gap:8px;padding:12px 24px;background:white;border-bottom:1px solid var(--g);overflow-x:auto}
.sc{flex:1;min-width:90px;background:#f9fafb;border-radius:10px;padding:10px 12px;border:1.5px solid var(--g);cursor:pointer;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sc:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.13)}
.sc.gold{background:#fffbeb;border-color:#fde68a}
.sc.green{background:#f0fdf4;border-color:#bbf7d0}
.sc.red{background:#fef2f2;border-color:#fecaca}
.sc.black{background:#1a1a1a;border-color:#000}
.sc.darkred{background:#fef2f2;border-color:#fca5a5}
.sn{font-size:20px;font-weight:900;color:var(--g8)}
.sc.gold .sn{color:var(--gold-d)}
.sc.green .sn{color:var(--green)}
.sc.red .sn{color:#dc2626}
.sc.black .sn{color:white}
.sc.darkred .sn{color:#dc2626}
.sl{font-size:10px;color:var(--g5);margin-top:2px;font-weight:700}
.sc.black .sl{color:rgba(255,255,255,.7)}

.tabs{display:flex;gap:4px;padding:12px 24px;background:white;border-bottom:1px solid var(--g);overflow-x:auto}
.tab{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:900;background:none;color:var(--g5);white-space:nowrap;cursor:pointer;transition:transform .2s}
.tab:hover{transform:scale(1.08)}
.tab.active{background:var(--gold);color:white}

.content{padding:20px 24px;max-width:1400px;margin:0 auto}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.si{flex:2;min-width:180px;padding:10px 14px;border:1.5px solid var(--g2);border-radius:10px;font-size:13px;outline:none;font-weight:700}
.si:focus{border-color:var(--gold)}
.fs{flex:1;min-width:130px;padding:10px 12px;border:1.5px solid var(--g2);border-radius:10px;font-size:13px;outline:none;background:white;font-weight:700}
.abtn{padding:10px 16px;background:var(--gold);color:white;border:none;border-radius:10px;font-size:13px;font-weight:900;cursor:pointer}
.abtn.sec{background:var(--g8)}
.abtn.grn{background:var(--green)}
.abtn.blue{background:var(--blue)}

.tw{overflow-x:auto;border-radius:12px;border:1.5px solid var(--g)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f9fafb;padding:10px 12px;text-align:right;color:var(--g5);font-weight:900;border-bottom:1.5px solid var(--g);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f9fafb;vertical-align:middle;transition:color .15s,background .15s}
tr{transition:transform .15s}
tr:hover{transform:scale(1.012)}
tr:hover td{background:#fffbeb !important;cursor:pointer;color:#e6a817 !important;font-weight:900}
tr:hover .cn{color:#e6a817 !important}
.cn{color:#1e3a5f;font-weight:900;transition:color .15s}
tr.bl td{background:#fef2f2}
tr.bl .cn{color:var(--red)}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:900}
.badge.hi{background:#d1fae5;color:#065f46}
.badge.mi{background:#fef3c7;color:#92400e}
.badge.lo{background:#fee2e2;color:#991b1b}
.badge.pend{background:#dbeafe;color:#1e40af}
.badge.appr{background:#d1fae5;color:#065f46}
.badge.rej{background:#dc2626;color:white;font-weight:900}
.badge.bl-badge{background:#1a1a1a;color:white;font-weight:900}
.stars{color:var(--gold);font-size:12px}
.blb{background:#1a1a1a;color:white;border:1px solid #000;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:900}
.pgn{display:flex;gap:6px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.pb{padding:7px 12px;border-radius:8px;border:1.5px solid var(--g2);background:white;font-size:13px;font-weight:700;cursor:pointer}
.pb.active{background:var(--gold);border-color:var(--gold);color:white}
.pb:disabled{opacity:.4;cursor:not-allowed}
.rc{font-size:12px;color:var(--g5);margin-bottom:10px;font-weight:700}
.loading{text-align:center;padding:40px;color:var(--g5);font-size:14px}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--g2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.mov.show{display:flex}
.mbox{background:white;border-radius:16px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mhdr{padding:20px 24px;border-bottom:1px solid var(--g);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:white;z-index:1}
.mhdr h2{font-size:16px;font-weight:900;color:var(--g8)}
.mcls{background:none;border:none;font-size:20px;color:#9ca3af;cursor:pointer;width:32px;height:32px;border-radius:50%}
.mbdy{padding:20px 24px}
.dr{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f9fafb}
.dr:last-child{border:none}
.dl{font-size:13px;color:var(--g5);font-weight:700}
.dv{font-size:13px;font-weight:900;color:var(--g8)}
.ltr-val{direction:ltr;text-align:left;word-break:break-all}
.st{font-size:13px;font-weight:900;color:#374151;margin:16px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--gold)}
.ir-box{background:#f0fdf4;border-radius:12px;padding:16px;border:2px solid #86efac;margin-bottom:12px}
.ir-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ir-fg{display:flex;flex-direction:column;gap:4px}
.ir-fg label{font-size:11px;font-weight:900;color:#374151}
.ir-fg input,.ir-fg select{padding:8px 10px;border:1.5px solid #d1fae5;border-radius:8px;font-size:13px;font-weight:700;outline:none}
.hist-item{background:#f9fafb;border-radius:10px;padding:10px 12px;margin-bottom:6px;border-right:3px solid var(--gold)}
.avg-box{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:2px solid #fde68a;border-radius:12px;padding:12px 16px;text-align:center;margin:12px 0}
.avg-num{font-size:32px;font-weight:900;color:var(--gold-d)}

/* AI TAB */
.ai-box{background:white;border-radius:16px;padding:24px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.ai-exs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.ai-ex{background:#f9fafb;border:1.5px solid var(--g2);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.ai-ex:hover{border-color:var(--gold);color:var(--gold-d)}
.ai-ta{width:100%;border:1.5px solid var(--g2);border-radius:10px;padding:12px;font-size:14px;font-weight:700;min-height:80px;outline:none;resize:vertical}
.ai-ta:focus{border-color:var(--gold)}
.ai-out{background:#f9fafb;border-radius:12px;padding:20px;margin-top:16px;font-size:14px;color:#374151;line-height:1.9;white-space:pre-wrap;border-right:3px solid var(--gold);display:none;font-weight:700}

/* REPORT */
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.rc2{background:white;border-radius:12px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,.07);border-top:3px solid var(--gold)}
.rc2 h4{font-size:14px;font-weight:900;color:#374151;margin-bottom:12px}
.rs{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f9fafb;font-size:13px;font-weight:700}

/* EXCEL IMPORT */
.excel-box{background:white;border-radius:16px;padding:24px;box-shadow:0 4px 15px rgba(0,0,0,.08);max-width:600px}
.drop-area{border:2.5px dashed #d1fae5;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:.2s;background:#f0fdf4}
.drop-area:hover{border-color:var(--green);background:#d1fae5}

/* === WATERMARK === */
.page-watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;background-repeat:no-repeat;background-position:center;background-size:contain;opacity:0.04;pointer-events:none;z-index:0}

/* === انیمیشن کتابی === */
@keyframes bookFlipIn{0%{transform:perspective(900px) rotateY(-90deg) scale(0.85);opacity:0}60%{transform:perspective(900px) rotateY(8deg) scale(1.02);opacity:1}100%{transform:perspective(900px) rotateY(0deg) scale(1);opacity:1}}
.book-flip-in{animation:bookFlipIn 0.45s cubic-bezier(.4,0,.2,1) both}
.clickable-text{cursor:pointer;display:inline-block;transition:transform .2s ease}
.clickable-text:hover{transform:scale(1.08)}
</style>
</head>
<body>

<div class="page-watermark" id="pageWatermark" style="display:none"></div>

<div id="loginPage">
  <div class="lbox">
    <div class="llogo">
      <img id="loginLogoImg" src="" alt="پتروشیمی نوری">
      <h1 class="clickable-text" onclick="doBookFlip(this)" style="color:#1e3a5f;font-size:22px;font-weight:900;margin-top:6px">پتروشیمی نوری</h1>
      <p class="clickable-text" onclick="doBookFlip(this)" style="font-size:13px;color:#6b7280;margin-top:4px;font-weight:700">سامانه مدیریت تامین‌کنندگان</p>
    </div>
    <div class="fg">
      <label>انتخاب کارمند</label>
      <select id="selEmp" onchange="onEmpChange()">
        <option value="">-- ابتدا کارمند را انتخاب کنید --</option>
        <option value="__admin__">👑 بررسی منابع</option>
      </select>
    </div>
    <div id="extraFields"></div>
    <div class="captcha-box" id="captchaBox" style="display:none">
      <div class="captcha-q" id="captchaQ"></div>
      <input class="captcha-inp" id="captchaAns" placeholder="جواب را وارد کنید" type="number">
    </div>
    <div id="lerr" class="lerr"></div>
    <button class="lbtn" onclick="doLogin()">ورود کارکنان</button>
    <a href="supplier-register.html" class="reg-link clickable-text" onclick="doBookFlip(this)">🏭 ثبت‌نام / ورود تامین‌کنندگان</a>
    <div class="lfoot">تمامی حقوق محفوظ است — پتروشیمی نوری ۱۴۰۴</div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-in">
      <div class="hdr-left">
        <img class="hdr-logo" id="hdrLogoImg" src="" alt="نوری">
        <div><h1>سامانه متمرکز مدیریت تامین و منابع</h1><p>پتروشیمی نوری</p></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="ubadge" id="userBadge"></span>
        <button class="logout" onclick="doLogout()">خروج</button>
      </div>
    </div>
  </div>
  <div class="stats" id="statsBar"></div>
  <div class="tabs" id="tabsBar"></div>
  <div class="content" id="mainContent"></div>
</div>

<div class="mov" id="modal" onclick="closeModal(event)">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mhdr"><h2 id="modalTitle"></h2><button class="mcls" onclick="closeModal()">✕</button></div>
    <div class="mbdy" id="modalBody"></div>
  </div>
</div>

function doLogin() {
  var v = document.getElementById("selEmp").value;
  if (!v) { showErr("کارمند را انتخاب کنید"); return; }
  if (v === "__admin__") {
    var u = document.getElementById("aUser") ? document.getElementById("aUser").value.trim() : "";
    var p = document.getElementById("aPass") ? document.getElementById("aPass").value.trim() : "";
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      curUser = {name:"بررسی منابع", personnel:"0000", isAdmin:true, company:"پتروشیمی نوری"};
      startApp();
    } else { showErr("نام کاربری یا رمز اشتباه است"); }
    return;
  }
  // captcha check
  var ans = document.getElementById("captchaAns") ? parseInt(document.getElementById("captchaAns").value) : NaN;
  if (isNaN(ans) || ans !== CAPTCHA_A + CAPTCHA_B) { showErr("جواب تست امنیتی اشتباه است"); genCaptcha(); return; }
  var empPass = document.getElementById("empPass");
  if (!empPass || !empPass.value) { showErr("رمز عبور را وارد کنید"); return; }
  var pass = empPass.value.trim();
  var emp = EMPLOYEES.find(function(e){ return e.personnel === v; });
  if (!emp || emp.pass !== pass) { showErr("رمز عبور اشتباه است"); return; }
  curUser = {name:emp.name, personnel:emp.personnel, isAdmin:false, company:"پتروشیمی نوری"};
  startApp();
}

async function loadSuppliers() {
  document.getElementById("mainContent").innerHTML = '<div class="loading"><div class="spin"></div> در حال بارگذاری از دیتابیس...</div>';
  if (!sb) { allSuppliers = []; document.getElementById("mainContent").innerHTML = '<div class="loading">خطا در اتصال به دیتابیس</div>'; return; }
  try {
    var res = await sb.from("suppliers").select("*").order("created_at", {ascending:false});
    if (res.error) throw res.error;
    allSuppliers = (res.data || []).map(function(s){
      if (s.id && s.id.startsWith("PGFH-")) s.id = s.id.replace("PGFH-","NOPC-");
      return s;
    });
  } catch(e) {
    console.error(e);
    allSuppliers = [];
  }
}

function getFiltered() {
  var list = allSuppliers.slice();
  if (fBlacklist) list = list.filter(function(s){ return s.is_blacklist; });
  if (fSearch) list = list.filter(function(s){ return s.name.indexOf(fSearch) >= 0 || (s.id && s.id.indexOf(fSearch) >= 0); });
  if (fCat) list = list.filter(function(s){ return s.category === fCat; });
  if (fProv) list = list.filter(function(s){ return s.province === fProv; });
  if (fStatus) list = list.filter(function(s){ return s.status === fStatus; });
  if (fType) list = list.filter(function(s){ return s.type === fType; });
  return list;
}

function filterByStat(type) {
  if (type === "blacklist") { fStatus = ""; fBlacklist = true; }
  else if (type === "") { fStatus = ""; fBlacklist = false; }
  else { fBlacklist = false; fStatus = type; }
  curPage = 1;
  renderStats();
  if (curTab === "list") renderTab("list");
  else renderTab(curTab);
}

function renderTabs() {
  var tabs = [["list","📋 تامین‌کنندگان"]];
  if (curUser.isAdmin) tabs.push(["ai","🤖 مشاور هوشمند"]);
  if (curUser.isAdmin) tabs.push(["report","📊 گزارش"]);
  if (curUser.isAdmin) tabs.push(["admin","⚙️ مدیریت"]);
  if (curUser.isAdmin) tabs.push(["excel","📥 ورود اطلاعات اکسل"]);
  document.getElementById("tabsBar").innerHTML = tabs.map(function(t){
    return '<button class="tab' + (curTab === t[0] ? " active" : "") + '" onclick="renderTab(\'' + t[0] + '\')">' + t[1] + '</button>';
  }).join("");
}

function renderTab(tab) {
  curTab = tab; renderTabs();
  var c = document.getElementById("mainContent");
  if (tab === "list") renderList(c);
  else if (tab === "ai") renderAI(c);
  else if (tab === "report") renderReport(c);
  else if (tab === "admin") renderAdmin(c);
  else if (tab === "excel") renderExcel(c);
}

function star(v) {
  var f = Math.floor(v || 0);
  return '<span class="stars">' + "★".repeat(Math.min(f,5)) + "☆".repeat(Math.max(0,5-f)) + '</span>';
}
function scoreBadge(v) {
  var cl = v >= 4 ? "hi" : v >= 3 ? "mi" : "lo";
  return '<span class="badge ' + cl + '">' + (v || "—") + '</span>';
}
function typeBadge(t) {
  var m = {legal:"حقوقی",real:"حقیقی",store:"فروشگاه",foreign:"خارجی"};
  var c = {legal:"hi",real:"mi",store:"pend",foreign:"appr"};
  return '<span class="badge ' + (c[t]||"mi") + '">' + (m[t]||t) + '</span>';
}
function statusBadge(s) {
  var m = {pending:"در انتظار",approved:"تایید شده",rejected:"رد شده"};
  var c = {pending:"pend",approved:"appr",rejected:"rej"};
  return '<span class="badge ' + (c[s]||"pend") + '">' + (m[s]||s) + '</span>';
}

function renderList(c) {
  var filtered = getFiltered();
  var total = filtered.length;
  var pages = Math.ceil(total / PER) || 1;
  curPage = Math.min(curPage, pages);
  var page = filtered.slice((curPage-1)*PER, curPage*PER);

  var catOpts = CATS.map(function(cat){ return '<option value="' + cat + '"' + (fCat===cat?" selected":"") + '>' + cat + '</option>'; }).join("");
  var provOpts = PROVS.map(function(p){ return '<option value="' + p + '"' + (fProv===p?" selected":"") + '>' + p + '</option>'; }).join("");

  var rows = page.map(function(s, i) {
    var avg = (s.status === "pending" && !s.is_blacklist) ? "0" : (s.avg_score || "—");
    var rowBg = (((curPage-1)*PER+i) % 2 === 1) ? 'background:#f5f5f5;' : '';
    return '<tr class="' + (s.is_blacklist ? "bl" : "") + '" style="' + rowBg + '" onclick="openDetail(\'' + s.id + '\')">' +
      '<td>' + ((curPage-1)*PER+i+1) + '</td>' +
      '<td style="font-size:11px;color:var(--g5)">' + (s.id||"").replace(/^PGFH-/,'NOPC-') + '</td>' +
      '<td><div class="cn hov-name">' + s.name + '</div>' + (s.is_blacklist ? '<div class="blb">🚫 لیست سیاه</div>' : '') + '</td>' +
      '<td>' + typeBadge(s.type) + '</td>' +
      '<td>' + (s.category||"—") + '</td>' +
      '<td>' + (s.province||"—") + '</td>' +
      '<td>' + statusBadge(s.status) + '</td>' +
      '<td>' + (avg === "0" ? '<span class="badge pend">0</span>' : (avg !== "—" ? scoreBadge(avg) : "—")) + '</td>' +
      '</tr>';
  }).join("");

  var pgBtns = "";
  for (var pg = Math.max(1,curPage-2); pg <= Math.min(pages,curPage+2); pg++) {
    pgBtns += '<button class="pb' + (pg===curPage?" active":"") + '" onclick="curPage=' + pg + ';renderTab(\'list\')">' + pg + '</button>';
  }

  c.innerHTML =
    '<div class="filters">' +
    '<input class="si" placeholder="🔍 جستجو نام یا کد..." value="' + fSearch + '" oninput="fSearch=this.value;curPage=1;renderTab(\'list\')">' +
    '<select class="fs" onchange="fType=this.value;curPage=1;renderTab(\'list\')"><option value="">همه انواع</option><option value="legal"' + (fType==="legal"?" selected":"") + '>حقوقی</option><option value="real"' + (fType==="real"?" selected":"") + '>حقیقی</option><option value="store"' + (fType==="store"?" selected":"") + '>فروشگاه</option><option value="foreign"' + (fType==="foreign"?" selected":"") + '>خارجی</option></select>' +
    '<select class="fs" onchange="fCat=this.value;curPage=1;renderTab(\'list\')"><option value="">همه دسته‌ها</option>' + catOpts + '</select>' +
    '<select class="fs" onchange="fProv=this.value;curPage=1;renderTab(\'list\')"><option value="">همه استان‌ها</option>' + provOpts + '</select>' +
    '<select class="fs" onchange="fStatus=this.value;fBlacklist=false;curPage=1;renderStats();renderTab(\'list\')"><option value="">همه وضعیت‌ها</option><option value="pending"' + (fStatus==="pending"?" selected":"") + '>در انتظار</option><option value="approved"' + (fStatus==="approved"?" selected":"") + '>تایید شده</option><option value="rejected"' + (fStatus==="rejected"?" selected":"") + '>رد شده</option></select>' +
    '<button class="abtn" onclick="exportCSV()">📥 CSV</button>' +
    (curUser.isAdmin ? '<button class="abtn grn" onclick="refreshData()">🔄 بروزرسانی</button>' : '') +
    '</div>' +
    '<div class="rc">' + total + ' تامین‌کننده — صفحه ' + curPage + ' از ' + pages + '</div>' +
    '<div class="tw"><table><thead><tr><th>#</th><th>کد</th><th>نام</th><th>نوع</th><th>دسته</th><th>استان</th><th>وضعیت</th><th>امتیاز</th></tr></thead><tbody>' + rows + '</tbody></table></div>' +

async function editField(suppId, field) {
  var s = allSuppliers.find(function(x){ return x.id === suppId; });
  var cur = s ? (field === 'phone' ? s.phone : s.email) : "";
  var label = field === 'phone' ? '📱 شماره موبایل' : '📧 ایمیل';
  var newVal = prompt(label + ' جدید:', cur || "");
  if (newVal === null) return;
  newVal = newVal.trim();
  if (!newVal) { alert("مقدار نمی‌تواند خالی باشد"); return; }
  try {
    var upd = {};
    upd[field] = newVal;
    await sb.from("suppliers").update(upd).eq("id", toDbId(suppId));
    var idx = allSuppliers.findIndex(function(x){ return x.id === suppId; });
    if (idx >= 0) allSuppliers[idx][field] = newVal;
    alert("✅ " + label + " با موفقیت بروزرسانی شد");
    openDetail(suppId);
  } catch(e) { alert("خطا: " + e.message); }
}

        +'<div style="width:30px;height:30px;background:linear-gradient(135deg,#ede9fe,#ddd6fe);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">📄</div>'

async function changeStatus(id, status) {
  if (status === "rejected") { showRejectModal(id); return; }
  try {
    await sb.from("suppliers").update({status:status}).eq("id",toDbId(id));
    var idx = allSuppliers.findIndex(function(x){return x.id===id;});
    if (idx>=0) allSuppliers[idx].status = status;
    alert("✅ شرکت با موفقیت تایید شد");
    closeModal();
    renderStats(); renderTab(curTab);
  } catch(e) { alert("خطا: " + e.message); }
}

async function confirmReject(suppId) {
  var reason = document.getElementById("rej_reason") ? document.getElementById("rej_reason").value.trim() : "";
  var phone = document.getElementById("rej_phone") ? document.getElementById("rej_phone").value.trim() : "";
  if (!reason) { alert("⚠️ لطفاً دلیل رد را وارد کنید"); return; }
  try {
    await sb.from("suppliers").update({status:"rejected"}).eq("id", toDbId(suppId));
    try {
      await sb.from("supplier_ratings").insert({
        supplier_id: toDbId(suppId), item_name:"دلیل رد", indent_no:"REJECT",
        rater_name:curUser.name, rater_company:"پتروشیمی نوری", rater_personnel:curUser.personnel,
        quality:0, communication:0, pricing:0, followup:0, delay_score:0, total_score:0, comment:reason
      });
    } catch(e2){}
    var idx = allSuppliers.findIndex(function(x){return x.id===suppId;});
    if (idx>=0) { allSuppliers[idx].status = "rejected"; }
    if (phone) alert("✅ رد شد.\n📱 پیام به " + phone + " ارسال شد.\nدلیل: " + reason);
    else alert("✅ وضعیت رد شد.");
    closeModal();
    renderStats(); renderTab(curTab);
  } catch(e) { alert("خطا: " + e.message); }
}

async function toggleBL(id) {
  var s = allSuppliers.find(function(x){ return x.id===id; });
  if (!s) return;
  var newBL = !s.is_blacklist;
  var newStatus = newBL ? "approved" : "approved";
  try {
    await sb.from("suppliers").update({is_blacklist:newBL, status: newStatus}).eq("id",toDbId(id));
    var idx = allSuppliers.findIndex(function(x){return x.id===id;});
    if (idx>=0) { allSuppliers[idx].is_blacklist = newBL; allSuppliers[idx].status = newStatus; }
    closeModal();
    renderStats(); renderTab(curTab);
  } catch(e) { alert("خطا: " + e.message); }
}

function exportCSV() {
  var f = getFiltered();
  var rows = [["کد","نام","نوع","دسته","استان","وضعیت","امتیاز"]];
  f.forEach(function(s){ rows.push([(s.id||'').replace(/^PGFH-/,'NOPC-'),s.name,s.type,s.category,s.province,s.status,s.avg_score||"—"]); });
  var csv = "\uFEFF" + rows.map(function(r){ return r.map(function(v){ return '"'+(v||"")+'"'; }).join(","); }).join("\n");
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download = "suppliers.csv"; a.click();
}

async function sendAI() {
  var q = document.getElementById("aiIn").value.trim();
  if (!q) return;
  var out = document.getElementById("aiOut");
  out.style.display = "block";
  out.innerHTML = '<div class="spin"></div> در حال پردازش...';
  var total = allSuppliers.length;
  var appr = allSuppliers.filter(function(s){return s.status==="approved"&&!s.is_blacklist;}).length;
  var pend = allSuppliers.filter(function(s){return s.status==="pending"&&!s.is_blacklist;}).length;
  var bl = allSuppliers.filter(function(s){return s.is_blacklist;}).length;
  var summary = "کل: " + total + " | تایید: " + appr + " | انتظار: " + pend + " | لیست سیاه: " + bl;
  try {
    var res = await fetch("https://api.avalai.ir/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer " + API_KEY},body:JSON.stringify({model:"gpt-4o-mini",max_tokens:600,messages:[{role:"user",content:"مشاور هوشمند سامانه تامین‌کنندگان پتروشیمی نوری هستید. آمار: "+summary+". سوال: "+q}]})});
    var data = await res.json();
    if(data.error){out.innerHTML="خطا: "+JSON.stringify(data.error);return;}
    out.innerHTML = data.choices&&data.choices[0]&&data.choices[0].message ? data.choices[0].message.content : "پاسخی دریافت نشد";
  } catch(e) { out.innerHTML = "خطا: " + e.message; }
}

    '</tbody></table></div>' : '<div style="text-align:center;color:var(--g5);font-weight:700;padding:20px">موردی در انتظار تایید نیست ✅</div>') +
    '</div>';
}

function renderExcel(c) {
  c.innerHTML = '<div class="excel-box"><h3 style="font-size:16px;font-weight:900;margin-bottom:6px;color:var(--g8)">📥 ورود اطلاعات از طریق اکسل</h3>' +
    '<p style="font-size:13px;color:var(--g5);font-weight:700;margin-bottom:20px">فایل اکسل تامین‌کنندگان را بارگذاری کنید. امتیاز صفر ثبت خواهد شد و بعداً قابل ویرایش است.</p>' +
    '<div class="drop-area" onclick="document.getElementById(\'xlsFile\').click()" id="dropArea">' +
    '<div style="font-size:48px;margin-bottom:12px">📊</div>' +
    '<div style="font-size:15px;font-weight:900;color:#065f46;margin-bottom:6px">کلیک کنید یا فایل را اینجا بکشید</div>' +
    '<div style="font-size:12px;color:var(--g5)">فرمت‌های مجاز: .xlsx, .xls, .csv</div>' +
    '<input type="file" id="xlsFile" style="display:none" accept=".xlsx,.xls,.csv" onchange="handleExcelFile(this)">' +
    '</div>' +
    '<div id="xlsPreview" style="margin-top:20px"></div>' +
    '<div style="margin-top:20px;background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:14px">' +
    '<div style="font-size:13px;font-weight:900;color:#92400e;margin-bottom:8px">📋 ساختار فایل اکسل</div>' +
    '<div style="font-size:12px;color:#374151;line-height:1.9;font-weight:700">ستون‌های مورد نیاز:<br>' +
    '<code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:11px">name</code> نام شرکت | ' +
    '<code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:11px">type</code> نوع (legal/real/store/foreign) | ' +
    '<code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:11px">category</code> دسته | ' +
    '<code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:11px">province</code> استان | ' +
    '<code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:11px">phone</code> تلفن | ' +
    '<code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:11px">email</code> ایمیل' +
    '</div></div></div>';
}

async function handleExcelFile(input) {
  var file = input.files[0];
  if (!file) return;
  var prev = document.getElementById("xlsPreview");
  prev.innerHTML = '<div class="loading"><div class="spin"></div> در حال پردازش...</div>';

  var reader = new FileReader();
  reader.onload = async function(e) {
    var text = e.target.result;
    var lines = text.split("\n").filter(function(l){ return l.trim(); });
    if (lines.length < 2) { prev.innerHTML = '<div style="color:red;font-weight:700">فایل خالی است</div>'; return; }
    var headers = lines[0].split(",").map(function(h){ return h.trim().replace(/"/g,""); });
    var rows = [];
    for (var i = 1; i < Math.min(lines.length, 51); i++) {
      var vals = lines[i].split(",").map(function(v){ return v.trim().replace(/"/g,""); });
      var row = {};
      headers.forEach(function(h,j){ row[h] = vals[j]||""; });
      rows.push(row);
    }
    prev.innerHTML = '<div style="font-size:13px;font-weight:900;color:#065f46;margin-bottom:10px">✅ ' + rows.length + ' ردیف شناسایی شد</div>' +
      '<div class="tw"><table><thead><tr><th>نام</th><th>نوع</th><th>دسته</th><th>استان</th><th>تلفن</th></tr></thead><tbody>' +
      rows.slice(0,5).map(function(r){ return '<tr><td>' + (r.name||"—") + '</td><td>' + (r.type||"—") + '</td><td>' + (r.category||"—") + '</td><td>' + (r.province||"—") + '</td><td>' + (r.phone||"—") + '</td></tr>'; }).join("") +
      '</tbody></table></div>' +
      (rows.length > 5 ? '<div style="font-size:12px;color:var(--g5);margin-top:6px;font-weight:700">و ' + (rows.length-5) + ' ردیف دیگر...</div>' : '') +
      '<button onclick="importExcelRows(' + JSON.stringify(rows).replace(/</g,"\\u003c") + ')" style="margin-top:14px;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:900;cursor:pointer">📥 ورود به سیستم</button>';
  };
  reader.readAsText(file, "UTF-8");
}

async function importExcelRows(rows) {
  var ok = 0; var fail = 0;
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    if (!r.name) { fail++; continue; }
    var trk = "NOPC-" + Math.floor(100000 + Math.random() * 900000);
    try {
      var res = await sb.from("suppliers").insert({
        id: trk, name: r.name, type: r.type||"legal",
        category: r.category||"", province: r.province||"",
        phone: r.phone||"", email: r.email||"",
        status: "approved", is_blacklist: false, avg_score: 0
      });
      if (!res.error) ok++; else fail++;
    } catch(e) { fail++; }
  }
  alert("✅ وارد شد: " + ok + " ردیف\n❌ ناموفق: " + fail + " ردیف");
  await loadSuppliers(); renderStats(); renderTab("list");
}

function showModal(title, body) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("modal").classList.add("show");
}
function closeModal(e) {
  if (!e || e.target.id === "modal") document.getElementById("modal").classList.remove("show");
}
</script>

</html>
